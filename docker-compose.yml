version: "3.9"

services:
  web:
    build: .
    container_name: digibiofi_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: >
      sh -c "
      until PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -h db -p 5432 -U ${POSTGRES_USER}; do
        echo 'Waiting for database...';
        sleep 2;
      done;
      alembic upgrade head &&
      if [ \"${TRUST_PROXY_HEADERS:-}\" = \"true\" ] || [ \"${APP_ENV:-development}\" = \"production\" ]; then
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*';
      else
        uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi
      "

  db:
    image: postgres:17
    container_name: digibiofi_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: digibiofi_redis
    restart: always

volumes:
  postgres_data:
