<!-- Global Navigation -->
<header class="sticky top-0 z-[60] px-6 md:px-12 py-5 flex items-center justify-between border-b border-white/5 panel-blur">
  <div class="flex items-center gap-12">
    <a href="/" class="flex items-center gap-3 font-display text-2xl font-bold text-white tracking-tight group">
      <div class="bg-gradient-to-br from-brand-blue to-brand-purple p-2 rounded-xl shadow-glow group-hover:scale-110 transition-transform">
        <i data-lucide="layers" class="w-6 h-6 text-white"></i>
      </div>
      <span class="hidden sm:inline">Digi<span class="text-brand-blue">BioFi</span></span>
    </a>

    <nav class="hidden lg:flex items-center gap-8">
      <a href="/explore" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Explore</a>
      <a href="/news" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Insights</a>
      <a href="/tools/job-matcher" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Tools</a>
      <a href="/what-is-digibiofi" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Why DigiBioFi</a>
    </nav>
  </div>

  <div class="flex items-center gap-4">
    {% if not user %}
      <a href="/login" class="text-sm font-semibold text-slate-400 hover:text-white transition-colors px-4">Log in</a>
      <a href="/register" class="btn-primary py-2.5 px-6 rounded-xl text-sm shadow-glow">
        Get Started
      </a>
    {% else %}
      <div class="flex items-center gap-6">
        <a href="/dashboard" class="text-sm font-semibold text-slate-400 hover:text-white transition-colors">Dashboard</a>
        {% if user.role == 'admin' %}
          <a href="/admin" class="text-sm font-semibold text-brand-purple hover:text-white transition-colors">Admin</a>
        {% endif %}
        <a href="/dashboard/profile" class="w-10 h-10 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center overflow-hidden hover:border-brand-blue/50 transition-colors">
          <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
        </a>
      </div>
    {% endif %}
  </div>
</header>
