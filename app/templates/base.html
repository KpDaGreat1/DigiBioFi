<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#127a67" />
  <meta name="description" content="DigiBioFi — The elite digital identity platform for high-impact professionals." />
  
  <!-- Favicon (SVG for better scaling) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23127a67%22/><path d=%22M25 30h50M25 50h40M25 70h30%22 stroke=%22white%22 stroke-width=%228%22 stroke-linecap=%22round%22/><circle cx=%2270%22 cy=%2270%22 r=%2212%22 fill=%22white%22/></svg>">
  
  <title>{% block title %}DigiBioFi — Your Digital Identity{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: 'rgb(var(--brand-50) / <alpha-value>)',
              100: 'rgb(var(--brand-100) / <alpha-value>)',
              200: 'rgb(var(--brand-200) / <alpha-value>)',
              300: 'rgb(var(--brand-300) / <alpha-value>)',
              400: 'rgb(var(--brand-400) / <alpha-value>)',
              500: 'rgb(var(--brand-500) / <alpha-value>)',
              600: 'rgb(var(--brand-600) / <alpha-value>)',
              700: 'rgb(var(--brand-700) / <alpha-value>)',
              800: 'rgb(var(--brand-800) / <alpha-value>)',
              900: 'rgb(var(--brand-900) / <alpha-value>)',
              950: 'rgb(var(--brand-950) / <alpha-value>)',
            },
            accent: {
              50: 'rgb(var(--accent-50) / <alpha-value>)',
              100: 'rgb(var(--accent-100) / <alpha-value>)',
              200: 'rgb(var(--accent-200) / <alpha-value>)',
              300: 'rgb(var(--accent-300) / <alpha-value>)',
              400: 'rgb(var(--accent-400) / <alpha-value>)',
              500: 'rgb(var(--accent-500) / <alpha-value>)',
              600: 'rgb(var(--accent-600) / <alpha-value>)',
            },
          },
          fontFamily: {
            sans: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['Fraunces', 'ui-serif', 'Georgia', 'serif'],
          },
          boxShadow: {
            'glass': '0 24px 60px -36px rgba(15, 23, 42, 0.35)',
            'premium': 'var(--shadow-premium)',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Lucide Icons (better than FontAwesome for modern UI) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/custom.css" />

  <style>
    .text-gradient {
      background: linear-gradient(135deg, rgb(var(--brand-500)) 0%, rgb(var(--accent-400)) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }
    .hover-lift {
      transition: transform 0.24s var(--curve-out), box-shadow 0.24s var(--curve-out);
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 42px -28px rgba(15, 23, 42, 0.55);
    }
    [v-cloak] { display: none; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 font-sans text-slate-900 antialiased selection:bg-brand-100 selection:text-brand-900">

  <!-- Flash Messages -->
  <div id="flash-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">
    {% for msg in get_flashed_messages(request) %}
      <div class="flash-message pointer-events-auto px-6 py-4 rounded-2xl shadow-2xl border flex items-center gap-3 animate-slide-in-right 
                  {% if msg.category == 'success' %}bg-emerald-50 border-emerald-100 text-emerald-700
                  {% elif msg.category == 'error' %}bg-red-50 border-red-100 text-red-700
                  {% else %}bg-slate-900 border-slate-800 text-white{% endif %}">
        <i data-lucide="{% if msg.category == 'success' %}check-circle{% elif msg.category == 'error' %}alert-circle{% else %}info{% endif %}" class="w-5 h-5"></i>
        <span class="text-sm font-bold">{{ msg.message }}</span>
        <button onclick="this.parentElement.remove()" class="ml-4 opacity-50 hover:opacity-100 transition-opacity">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    {% endfor %}
  </div>

  {% block body %}{% endblock %}

  <!-- Main JS -->
  <script src="/static/js/main.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
