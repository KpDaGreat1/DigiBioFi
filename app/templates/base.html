<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  
  <title>{% block title %}DigiBioFi — Your Digital Identity{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f5f7ff',
              100: '#ebf0fe',
              200: '#dce5fd',
              300: '#c1cffa',
              400: '#9baaf7',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#1e1b4b',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            'premium': '0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -2px rgba(0, 0, 0, 0.01)',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Lucide Icons (better than FontAwesome for modern UI) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/custom.css" />

  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .text-gradient {
      background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hover-lift {
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    [v-cloak] { display: none; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 font-sans text-slate-900 antialiased selection:bg-brand-100 selection:text-brand-900">

  {% block body %}{% endblock %}

  <!-- Main JS -->
  <script src="/static/js/main.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
