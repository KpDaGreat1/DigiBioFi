{% extends "base.html" %}
{% block title %}Access Restricted — DigiBioFi{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-lg">
    <div class="text-8xl font-black text-amber-500/20 mb-4">403</div>
    <h1 class="text-2xl font-bold text-white mb-2">Access restricted</h1>
    <p class="text-slate-400 text-sm mb-6">{{ message or "You do not have access to this page or action." }}</p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/" class="inline-flex items-center gap-2 btn-primary px-6 py-2.5 rounded-xl text-sm">
        Go home
      </a>
      <a href="/login" class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold text-slate-300 border border-white/10 hover:text-white hover:border-white/20 transition-colors">
        Back to login
      </a>
    </div>
  </div>
</div>
{% endblock %}
